<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Teri Mummy - The ultimate animated text experience">
    <title>Teri Mummy App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Background Effects -->
    <div class="background-effects">
        <div class="gradient-blob blob-1"></div>
        <div class="gradient-blob blob-2"></div>
        <div class="gradient-blob blob-3"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <a href="/" class="logo">
            TM<span class="logo-accent">.app</span>
        </a>
        <nav class="nav">
            <a href="#about" class="nav-link">About</a>
            <a href="#admin" class="nav-button">Login</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="hero">
        <div class="hero-content">
            <h1 class="title">TERI MUMMY</h1>
            <div class="animated-text-container">
                <span class="animated-text" id="animatedText">meri mummy</span>
            </div>
            <p class="hint">Hover to pause • Watch the magic</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2025 Teri Mummy App. Made with ❤️ and pure HTML/CSS/JS</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
